<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<meta name="description" content="Operations console for the agentic trading system.">
<title>Agentic Trading — Operations</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%233987e5'/></svg>">
<link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
<a class="sr-only" href="#main">Skip to content</a>

<div class="app">
  <nav class="rail" id="rail" aria-label="Sections"></nav>

  <header class="topbar">
    <span class="title" id="viewTitle">Cockpit</span>
    <span class="spacer"></span>
    <span class="hint num mono" id="clock"></span>
    <span class="head-actions">
      <button onclick="openPalette()" title="Search and commands (Ctrl/Cmd-K)">⌘K</button>
    </span>
  </header>

  <main id="main" aria-live="polite">
    <div class="grid">
      <div class="card col-12"><div class="skel" style="height:19px;width:38%"></div></div>
    </div>
  </main>
</div>

<div class="scrim" id="scrim"></div>

<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
  <div class="grab"></div>
  <header>
    <h2 id="drawerTitle">Detail</h2>
    <span class="hint" id="drawerSub"></span>
    <span class="spacer"></span>
    <button class="icon" id="drawerClose" aria-label="Close panel">✕</button>
  </header>
  <div class="body" id="drawerBody"></div>
</aside>

<div class="palette" id="palette" role="dialog" aria-modal="true" aria-label="Search and commands">
  <div class="box">
    <input id="palInput" placeholder="Jump to a view, a symbol, or search the agent's reasoning…"
           autocomplete="off" spellcheck="false" aria-controls="palResults">
    <div class="results" id="palResults" role="listbox"></div>
  </div>
</div>

<div class="toasts" id="toasts" aria-live="polite"></div>

<script src="/static/js/charts.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
